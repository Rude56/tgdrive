name = "my-file-share"
main = "worker.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "file-share-db"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
# 以下变量请在 Cloudflare Dashboard → Workers → Settings → Variables 中配置
# TG_TOKEN = ""
# TG_CHAT_ID = ""
# ADMIN_PASSWORD = ""
# BG_URL = ""
# DARK_BG_URL = ""
# LOGO_URL = ""
